openapi: 3.0.3
info:
  title: Shop Backend Service API
  version: 1.0.0
  description: |
    Backend service for authentication, products, orders, order cancellation, purchase history,
    and admin statistics.

servers:
  - url: /

tags:
  - name: Auth
  - name: Products
  - name: Orders
  - name: Admin
  - name: Health

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: not_found
        message:
          type: string
          example: Resource was not found
        details:
          type: string
          nullable: true
      required: [code, message]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: StrongPass123!
      required: [email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: StrongPass123!
      required: [email, password]

    UserInfoResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [USER, ADMIN]
      required: [id, email, role]

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserInfoResponse'
      required: [accessToken, tokenType, user]

    ProductRequest:
      type: object
      properties:
        name:
          type: string
          example: Mechanical Keyboard
        description:
          type: string
          example: Hot-swappable mechanical keyboard
        price:
          type: string
          example: "129.99"
        stock:
          type: integer
          minimum: 0
          example: 15
      required: [name, description, price, stock]

    ProductResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: string
          example: "129.99"
        stock:
          type: integer
        createdAt:
          type: string
          example: 2026-03-29T10:00:00Z
        updatedAt:
          type: string
          example: 2026-03-29T10:00:00Z
      required: [id, name, description, price, stock, createdAt, updatedAt]

    ProductListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
      required: [items]

    CreateOrderItemRequest:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          example: 2
      required: [productId, quantity]

    CreateOrderRequest:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'
      required: [items]

    OrderItemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: string
          example: "129.99"
        lineTotal:
          type: string
          example: "259.98"
      required: [id, productId, productName, quantity, unitPrice, lineTotal]

    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          type: string
          enum: [CREATED, CANCELLED]
        totalAmount:
          type: string
          example: "259.98"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'
        createdAt:
          type: string
          example: 2026-03-29T10:10:00Z
        updatedAt:
          type: string
          example: 2026-03-29T10:10:00Z
      required: [id, userId, status, totalAmount, items, createdAt, updatedAt]

    OrderListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderResponse'
      required: [items]

    TopProductStatResponse:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        productName:
          type: string
        orderedQuantity:
          type: integer
      required: [productId, productName, orderedQuantity]

    OrderStatsResponse:
      type: object
      properties:
        totalOrders:
          type: integer
          format: int64
        cancelledOrders:
          type: integer
          format: int64
        totalRevenue:
          type: string
          example: "1439.90"
        topProducts:
          type: array
          items:
            $ref: '#/components/schemas/TopProductStatResponse'
      required: [totalOrders, cancelledOrders, totalRevenue, topProducts]

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check endpoint
      description: Simple liveness endpoint for the service.
      responses:
        '200':
          description: Service is healthy

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a regular user account and returns a JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: user@example.com
              password: StrongPass123!
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      description: Authenticates the user and returns a JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: user@example.com
              password: StrongPass123!
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products:
    get:
      tags: [Products]
      summary: List products
      description: Returns all available products.
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

    post:
      tags: [Admin]
      summary: Create product
      description: Creates a product. Requires admin role.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by id
      description: Returns a single product. Uses Redis cache when available.
      parameters:
        - name: id
          in: path
          required: true
          description: Product identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Admin]
      summary: Update product
      description: Updates an existing product and invalidates the cache. Requires admin role.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product identifier
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '200':
          description: Updated product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'

    delete:
      tags: [Admin]
      summary: Delete product
      description: Deletes a product. Requires admin role.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product identifier
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Product deleted
        '409':
          description: Product is referenced by orders and cannot be removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders:
    post:
      tags: [Orders]
      summary: Create order
      description: Creates an order, validates stock, reduces stock, writes an audit log, publishes an event, and caches the order.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              items:
                - productId: 4b35f44b-5d6e-4ea4-a8e8-1234567890ab
                  quantity: 2
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Validation or business error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized

    get:
      tags: [Orders]
      summary: Get user order history
      description: Returns all orders that belong to the current user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'

  /orders/{id}:
    delete:
      tags: [Orders]
      summary: Cancel order
      description: Cancels the current user's order, restores stock, writes an audit log, publishes an event, and refreshes the cached order.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Order identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '403':
          description: Access denied
        '404':
          description: Order not found

  /stats/orders:
    get:
      tags: [Admin]
      summary: Get order statistics
      description: Returns aggregated order metrics for admins only.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Order stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatsResponse'
        '403':
          description: Access denied
